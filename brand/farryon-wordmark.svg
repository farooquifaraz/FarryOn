      <rect x="213" y="191" width="20" height="130" rx="10"/>
      <rect x="247" y="171" width="20" height="170" rx="10"/>
      <rect x="281" y="201" width="20" height="110" rx="10"/>
      <rect x="315" y="226" width="20" height="60"  rx="10"/>
    </g>
  </g>
  <!-- wordmark -->
  <text x="250" y="158" font-family="'Segoe UI',Roboto,Helvetica,Arial,sans-serif" font-size="128" font-weight="800" letter-spacing="-3" fill="currentColor">Farry<tspan fill="url(#g)">On</tspan></text>
