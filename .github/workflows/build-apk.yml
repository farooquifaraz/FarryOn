name: Build Android APK

# Builds an installable debug APK in the cloud — no local Flutter SDK needed.
# Trigger manually (Actions tab → "Build Android APK" → Run workflow) or it runs
# automatically when anything under mobile/ changes on the dev branch.
# Download the APK from the run's "Artifacts" section and sideload it on a phone
# (enable "Install unknown apps"). Point it at your deployed backend in the app's
# in-app settings sheet (⚙️): host = <name>.onrender.com, port = 443, secure = ON.
#
# Note: the app ships its Dart code (lib/), pubspec, and tests, but not the
# generated Android Gradle project. We materialise a version-correct Android
# project (v2 embedding) at build time with `flutter create`, then patch in the
# camera/mic/internet permissions. This keeps the repo free of generated gradle
# while guaranteeing the scaffold matches the pinned Flutter version.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Materialise Android project (v2 embedding)
        run: |
          flutter create \
            --org com.farryon --project-name farryon \
            --platforms=android /tmp/farryon_scaffold
          rm -rf android
          cp -r /tmp/farryon_scaffold/android ./android

      - name: Apply runtime permissions to AndroidManifest
        run: |
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/app/src/main/AndroidManifest.xml")
          xml = p.read_text()
          perms = (
              '    <uses-permission android:name="android.permission.INTERNET"/>\n'
              '    <uses-permission android:name="android.permission.CAMERA"/>\n'
              '    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n'
          )
          if "android.permission.CAMERA" not in xml:
              xml = re.sub(r"(<manifest[^>]*>\s*\n)", r"\1" + perms, xml, count=1)
              p.write_text(xml)
              print("Permissions injected:\n" + perms)
          else:
              print("Permissions already present.")
          PY

      - name: Resolve dependencies
        run: flutter pub get

      - name: Static analysis (non-blocking)
        run: flutter analyze || true

      - name: Build release APKs (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: List built APK sizes
        run: ls -lh build/app/outputs/flutter-apk/

      - name: Upload APK (arm64-v8a release)
        uses: actions/upload-artifact@v4
        with:
          name: farryon-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: error
