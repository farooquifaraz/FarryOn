name: Build Android APK

# Builds an installable debug APK in the cloud — no local Flutter SDK needed.
# Trigger manually (Actions tab → "Build Android APK" → Run workflow) or it runs
# automatically when anything under mobile/ changes on the dev branch.
# Download the APK from the run's "Artifacts" section and sideload it on a phone
# (enable "Install unknown apps"). Point it at your deployed backend in the app's
# in-app settings sheet (⚙️): host = <name>.onrender.com, port = 443, secure = ON.

on:
  workflow_dispatch:
  push:
    branches: ["claude/gallant-franklin-j6qzbx"]
    paths:
      - "mobile/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Resolve dependencies
        run: flutter pub get

      - name: Static analysis (non-blocking)
        run: flutter analyze || true

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: farryon-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
