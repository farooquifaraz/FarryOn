# Render Blueprint — one-click cloud deploy of the FarryOn backend.
#
# How to use (nothing to install locally):
#   1. Push this repo to GitHub (already done).
#   2. On https://render.com → New → Blueprint → connect the repo and pick the
#      branch. Render reads this file.
#   3. In the service's Environment tab, set the SECRET values that are marked
#      `sync: false` below (OPENAI_API_KEY / GEMINI_API_KEY) to your *rotated*
#      keys. NEVER commit keys to git.
#   4. Deploy. You get a public URL like
#      https://farryon-backend-xxxx.onrender.com  →  the app connects to
#      wss://farryon-backend-xxxx.onrender.com:443/ws/live
#
# Notes:
#   * Free instances sleep after ~15 min idle; the first connection cold-starts
#     (~30–60s). Fine for testing; use a paid plan / Postgres for anything real.
#   * SQLite here is ephemeral (resets on redeploy) — which now means every
#     deploy deletes every registered account, not just some cached rows. Add a
#     Render Postgres and set DATABASE_URL=postgresql+asyncpg://... BEFORE real
#     users exist. `autoDeploy` is off until then; see below.
#   * Realtime needs a realtime/live-capable model (see values below) — standard
#     models like gpt-4.1 / gemini-1.5-flash do NOT work with the streaming APIs.
services:
  - type: web
    name: farryon-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /healthz
    # OFF until the database survives a deploy. On the free plan this service
    # runs the ephemeral SQLite below, so every deploy drops every account —
    # and with autoDeploy on, every *push* is a deploy. That trade was fine
    # while nothing was stored; it stops being fine the moment one real person
    # signs up. Deploy from the Render dashboard meanwhile ("Manual Deploy"),
    # and turn this back on once DATABASE_URL points at a real Postgres.
    autoDeploy: false
    envVars:
      - key: AI_PROVIDER
        value: gemini                       # server default; the app can switch
      - key: GEMINI_API_KEY
        sync: false                         # set in the Render dashboard (secret)
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-native-audio-latest  # a LIVE model (not gemini-1.5-flash)
      # Landmark & product finder (Google Cloud Vision). Product AI text reuses
      # GEMINI_API_KEY above — no separate key needed for that.
      - key: VISION_API_KEY
        sync: false                         # set in the Render dashboard (secret)
      - key: OPENAI_API_KEY
        sync: false                         # optional — only if you use OpenAI
      - key: OPENAI_REALTIME_MODEL
        value: gpt-realtime      # a REALTIME model (not gpt-4.1)
      - key: GROK_API_KEY
        sync: false                         # optional — only if you use Grok
      - key: GROK_REALTIME_MODEL
        value: grok-realtime
      # Web search (Tavily primary → Serper fallback). Keys are secrets.
      - key: WEB_SEARCH_PROVIDER
        value: tavily
      - key: WEB_SEARCH_API_KEY
        sync: false
      - key: WEB_SEARCH_FALLBACK_PROVIDER
        value: serper
      - key: WEB_SEARCH_FALLBACK_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
