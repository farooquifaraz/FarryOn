[pytest]
asyncio_mode = auto
testpaths = tests
addopts = -ra
filterwarnings =
    ignore::DeprecationWarning
    # aiosqlite's worker thread is torn down just after the threaded TestClient's
    # event loop closes, surfacing a harmless "Event loop is closed" thread
    # exception. It does not affect the app or any assertion; silence just this
    # test-infra teardown race (the only thread-exception source in the suite).
    ignore:Exception in thread:pytest.PytestUnhandledThreadExceptionWarning
    # Starlette's TestClient warns about its own httpx dependency — third-party
    # test infrastructure, unrelated to FarryOn code.
    ignore:Using .httpx. with .starlette
