include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Treat missing await and dead code as errors to keep the realtime plumbing
    # tight.
    unawaited_futures: warning

linter:
  rules:
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_locals
    - avoid_print
    - unawaited_futures
    - directives_ordering
