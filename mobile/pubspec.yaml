name: farryon
description: FarryOn — real-time multimodal AI assistant (voice + vision + agentic actions).
publish_to: "none"
version: 1.0.0+1

environment:
  # Flutter 3.22+/Dart 3.4+ for the Material 3 surfaceContainer* roles and
  # Color.withValues used in the UI.
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management.
  flutter_riverpod: ^2.5.1

  # Realtime transport.
  web_socket_channel: ^2.4.5
  stream_channel: ^2.1.2

  # Capture: camera frames + streaming PCM audio (capture & playback).
  # flutter_sound >= 9.21.1 is required for feedUint8FromStream() and the
  # interleaved / bufferSize params used by PcmPlayer (startPlayerFromStream).
  camera: ^0.10.6
  flutter_sound: ^9.21.1
  image: ^4.1.7

  # Permissions for mic + camera.
  permission_handler: ^11.3.1

  # Persist backend/provider settings across launches.
  shared_preferences: ^2.2.3

  # REST calls for the Notes/Tasks view.
  http: ^1.2.0

  # Local notifications for reminders (fire at a task's due time).
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Location ("where am I") — GPS fix + reverse-geocoded address.
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # Finder: pick/capture a photo to identify, and open Maps/Wikipedia/shop links.
  image_picker: ^1.1.0
  url_launcher: ^6.3.0

  # Resolve a spoken contact name to a phone number for WhatsApp, on-device
  # (contacts never leave the phone).
  flutter_contacts: ^1.1.9+1

  # Share the in-app debug log (tool/usage/error trail) via the OS share sheet,
  # so issues can be reported without screenshots. Written to a temp .txt file
  # (path_provider) and shared as a FILE — a long log is too big for a chat box.
  share_plus: ^10.0.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # Generates all launcher-icon densities (mdpi→xxxhdpi) + adaptive icon from a
  # single source PNG. Run: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

# App icon — the FARRYON winged-orb emblem. Source lives at the path below;
# `dart run flutter_launcher_icons` writes the mipmaps + adaptive icon.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon/farryon_icon.png"
  min_sdk_android: 21
  # Adaptive icon: background matches the emblem's own dark-teal backdrop so the
  # masked foreground blends seamlessly.
  adaptive_icon_background: "#0E242B"
  adaptive_icon_foreground: "assets/icon/farryon_icon.png"
